<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title></title>
  <style>
    body {
        margin: 0;
        display: flex;
        font-family: "Times New Roman", Times, serif;
    }

    .sidebar {
      width: 220px;
      background: #ffffff;
      color: #000000;
      padding: 20px;
      height: 100vh;
      box-sizing: border-box;
      position: fixed;
      left: 0;
      top: 0;
    }

    .sidebar h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .sidebar a {
      display: block;
      color: #000000;
      text-decoration: none;
      margin: 10px 0;
    }

    .sidebar a:hover {
      color: #000000;
    }

    .main-area {
      flex: 1;
      margin-left: 220px;
      min-height: 100vh;
      background-image: url('/assets/images/background1.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      padding: 40px;
      box-sizing: border-box;
    }

    .content {
      background: #000000;
      color: #ffffff;
      padding: 40px;
      max-width: 900px;
      margin: 0 auto;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      position: relative;
    }
    
    .footnote-ref {
      color: #00ff22;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: dotted;
    }

    .footnote-ref:hover {
      color: #6bff7c;
    }

    .footnote-popup {
      position: fixed;
      background: #ffffff;
      color: #000000;
      padding: 15px 20px;
      border-radius: 0px;
      max-width: 700px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
      font-size: 14px;
      line-height: 1.6;
    }

    .footnote-popup.show {
      display: block;
    }

    .footnote-popup::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 20px;
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 8px solid #ffffff;
    }

    .footnote-close {
      position: absolute;
      top: 8px;
      right: 10px;
      cursor: pointer;
      font-size: 18px;
      color: #666;
      font-weight: bold;
      line-height: 1;
    }

    .footnote-close:hover {
      color: #000;
    }

      h1 {
    margin-bottom: 1px;
    }

      h2 {
    margin-bottom: 1px;
    }

      p {
    margin-top: 0px; 
    line-height: 1.5; 
   }

   a {
  color: #0077ff;
  cursor: pointer;
  text-decoration: underline;
  text-decoration-style: solid;
   }
   /* Mobile styles */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .sidebar h1 {
        margin-bottom: 0;
        font-size: 18px;
      }

      .sidebar nav {
        display: flex;
        gap: 20px;
      }

      .sidebar a {
        display: inline;
        margin: 0;
      }

      .main-area {
        margin-left: 0;
        padding: 20px;
        background-image: url('/assets/images/background1.png');
      }

      .content {
        padding: 25px;
      }

      .footnote-popup {
        max-width: 280px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h1>l'appel du vide</h1>
    <nav>
      <a href="/about">harper is who?</a>
      <a href="/posts">writing</a>
    </nav>
  </div>

  <div class="main-area">
    <div class="content">
      <style>
        .content {
      background: #00000000;
      color: #ffffff;
      padding: 40px;
      max-width: 900px;
      margin: 0 auto;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      position: relative;
    }
</style>

<h1></h1>

    </div>
  </div>

  <div id="footnote-popup" class="footnote-popup">
    <span class="footnote-close" onclick="hideFootnote()">&times;</span>
    <div id="footnote-content"></div>
  </div>

  <script>
    let currentPopup = null;

    function showFootnote(event, text) {
      event.preventDefault();
      event.stopPropagation();
      
      const popup = document.getElementById('footnote-popup');
      const content = document.getElementById('footnote-content');
      
      content.innerHTML = text;
      popup.classList.add('show');
      
      // Position the popup near the click
      const x = event.clientX;
      const y = event.clientY;
      
      // Set initial position
      popup.style.left = x + 'px';
      popup.style.top = (y + 15) + 'px';
      
      // Adjust if popup goes off screen
      setTimeout(() => {
        const rect = popup.getBoundingClientRect();
        
        if (rect.right > window.innerWidth) {
          popup.style.left = (window.innerWidth - rect.width - 20) + 'px';
        }
        
        if (rect.bottom > window.innerHeight) {
          popup.style.top = (y - rect.height - 15) + 'px';
          // Move arrow to bottom
          popup.style.setProperty('--arrow-position', 'bottom');
        }
      }, 10);
      
      currentPopup = popup;
    }

    function hideFootnote() {
      const popup = document.getElementById('footnote-popup');
      popup.classList.remove('show');
      currentPopup = null;
    }

    // Close popup when clicking outside
    document.addEventListener('click', function(event) {
      if (currentPopup && !currentPopup.contains(event.target) && !event.target.classList.contains('footnote-ref')) {
        hideFootnote();
      }
    });

    // Close popup on escape key
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape' && currentPopup) {
        hideFootnote();
      }
    });
  </script>
</body>
</html>
