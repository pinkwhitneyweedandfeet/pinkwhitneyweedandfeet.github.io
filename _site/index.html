<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title></title>
  <style>
    body {
        margin: 0;
        display: flex;
        font-family: "Times New Roman", Times, serif;
    }

    .sidebar {
      width: 220px;
      background: #ffffff;
      color: #000000;
      padding: 20px;
      height: 100vh;
      box-sizing: border-box;
      position: fixed;
      left: 0;
      top: 0;
    }

    .sidebar h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .sidebar a {
      display: block;
      color: #000000;
      text-decoration: none;
      margin: 10px 0;
    }

    .sidebar a:hover {
      color: #000000;
    }

    .main-area {
      flex: 1;
      margin-left: 220px;
      min-height: 100vh;
      background-image: url('/assets/images/background1.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      padding: 40px;
      box-sizing: border-box;
    }

    .content {
      background: #000000;
      color: #ffffff;
      padding-top: 10px;
      padding-left: 40px;
      padding-right: 40px;
      padding-bottom: 40px;
      max-width: 900px;
      margin: 0 auto;
      position: relative;
    }
    
    .footnote-ref {
      color: #00ff22;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: dotted;
    }

    .footnote-ref:hover {
      color: #6bff7c;
    }

    .footnote-ref.expanded {
      background: #00ff22;
      color: #000000;
    }

    /* Expanded footnote styles */
    .footnote-expansion {
      background: #000000;
      margin: 20px;
      padding-top: 20px;
      padding-left: 40px;
      padding-right: 40px;
      display: none;
      position: relative;
    }

    .footnote-expansion.show {
      display: block;
    }

    .footnote-expansion::before {
      content: '*';
      position: absolute;
      top: 10px;
      left: 10px;
      color: #00ff22;
      font-size: 24px;
    }

    .footnote-expansion-content {
      color: #ffffff;
      line-height: 1.2;
      font-size: 15px;
    }

    .footnote-expansion-close {
      margin-top: 15px;
      color: #00ff22;
      cursor: pointer;
      font-size: 14px;
      text-align: right;
    }

    .footnote-expansion-close:hover {
      color: #6bff7c;
    }

    h1 {
      margin-bottom: 1px;
    }

    h2 {
      margin-bottom: 1px;
    }

    p {
      margin-top: 0px; 
      line-height: 1.2; 
    }

    a {
      color: #0077ff;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: solid;
    }

    li {
      line-height: 1.2;
    }

    /* Mobile styles */
    @media screen and (max-width: 1200px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .sidebar h1 {
        margin-bottom: 0;
        font-size: 18px;
      }

      .sidebar nav {
        display: flex;
        gap: 20px;
      }

      .sidebar a {
        display: inline;
        margin: 0;
      }

      .main-area {
        margin-left: 0;
        padding: 20px;
        background-image: url('/assets/images/ground2.jpg');
        flex-direction: row;
        background-attachment: fixed;
        position: sticky;
        max-height: 110%;
      }

      .content {
        padding: 25px;
      }

      .footnote-expansion {
        margin: 20px -25px;
        padding: 20px 25px 20px 40px;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <a href="/"><h1>l'appel du vide</h1></a>
    <nav>
      <a href="/about">harper is who?</a>
      <a href="/posts">writing</a>
    </nav>
  </div>

  <div class="main-area">
    <div class="content" id="main-content">
      <style>
        .content {
      background: #00000000;
      color: #ffffff;
      padding: 40px;
      max-width: 900px;
      margin: 0 auto;
      position: relative;
    }
</style>

<h1></h1>

    </div>
  </div>

  <script>
    function showFootnote(event, text) {
      event.preventDefault();
      event.stopPropagation();
      
      const refElement = event.target;
      
      // If this footnote is already expanded, close it
      const existingExpansion = document.querySelector(`.footnote-expansion[data-ref-id="${refElement.dataset.footnoteId}"]`);
      if (existingExpansion) {
        closeExpandedFootnote(existingExpansion.querySelector('.footnote-expansion-close'));
        return;
      }
      
      // Close all other expanded footnotes
      closeAllExpandedFootnotes();
      
      // Mark reference as expanded
      refElement.classList.add('expanded');
      
      // Find the closest block-level element to insert after
      let insertAfter = findInsertionPoint(refElement);
      
      // Create expansion
      const expansion = document.createElement('div');
      expansion.className = 'footnote-expansion show';
      expansion.innerHTML = `
        <div class="footnote-expansion-content">${text}</div>
        <div class="footnote-expansion-close" onclick="closeExpandedFootnote(this)">
          [close]
        </div>
      `;
      
      // Create unique ID for linking
      if (!refElement.dataset.footnoteId) {
        refElement.dataset.footnoteId = `footnote-${Date.now()}`;
      }
      expansion.dataset.refId = refElement.dataset.footnoteId;
      
      // Insert the expansion
      insertAfter.parentNode.insertBefore(expansion, insertAfter.nextSibling);
    }

    function findInsertionPoint(element) {
      // Walk up the DOM tree to find appropriate insertion point
      let current = element;
      
      // Block-level elements where we want to insert after
      const blockElements = ['P', 'DIV', 'BLOCKQUOTE', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6', 'LI', 'PRE', 'ARTICLE', 'SECTION'];
      
      while (current && current !== document.body) {
        if (blockElements.includes(current.tagName)) {
          return current;
        }
        current = current.parentElement;
      }
      
      // Fallback to the element itself
      return element;
    }

    function closeExpandedFootnote(closeButton) {
      const expansion = closeButton.closest('.footnote-expansion');
      if (!expansion) return;
      
      // Remove highlight from reference
      const refId = expansion.dataset.refId;
      if (refId) {
        const refElement = document.querySelector(`[data-footnote-id="${refId}"]`);
        if (refElement) {
          refElement.classList.remove('expanded');
        }
      }
      
      // Remove expansion
      expansion.remove();
    }

    function closeAllExpandedFootnotes() {
      document.querySelectorAll('.footnote-expansion').forEach(exp => {
        const closeBtn = exp.querySelector('.footnote-expansion-close');
        if (closeBtn) closeExpandedFootnote(closeBtn);
      });
      
      document.querySelectorAll('.footnote-ref.expanded').forEach(ref => {
        ref.classList.remove('expanded');
      });
    }

    // Close expanded footnotes when clicking outside
    document.addEventListener('click', function(event) {
      if (!event.target.classList.contains('footnote-ref') && 
          !event.target.closest('.footnote-expansion')) {
        closeAllExpandedFootnotes();
      }
    });

    // Close on escape key
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') {
        closeAllExpandedFootnotes();
      }
    });
  </script>
</body>
</html>
